<!doctype html>
<html>
    <body>
        <h2>Matchmaking Test Client</h2>
        <div
            id="identity"
            style="font-size: 20px; font-weight: bold; margin-bottom: 10px"
        ></div>
        <button
            id="joinBtn"
            style="padding: 10px; font-size: 16px; margin-bottom: 20px"
        >
            Join Queue
        </button>
        <div
            id="output"
            style="font-family: monospace; background: #f4f4f4; padding: 10px"
        ></div>

        <script>
            // Generate ONE identity for this entire browser tab
            const myPlayerId = "player_" + Math.floor(Math.random() * 10000);
            document.getElementById("identity").innerText =
                "You are: " + myPlayerId;

            const socket = new WebSocket("ws://127.0.0.1:3000/ws");
            const output = document.getElementById("output");

            socket.onopen = function (e) {
                output.innerHTML +=
                    "<p style='color: green;'>Connected to server!</p>";
            };

            // Always send the same identity
            document.getElementById("joinBtn").onclick = function () {
                const payload = { action: "join_queue", player_id: myPlayerId };
                socket.send(JSON.stringify(payload));
                output.innerHTML += `<p><i>Sent request to join...</i></p>`;
            };

            socket.onmessage = function (event) {
                output.innerHTML += `<p style='color: blue;'><b>Server says:</b> ${event.data}</p>`;
            };
        </script>
    </body>
</html>
