<!doctype html>
<html>
    <body>
        <h2>Matchmaking Test Client</h2>
        <div
            id="identity"
            style="font-size: 20px; font-weight: bold; margin-bottom: 10px"
        ></div>
        <button
            id="joinBtn"
            style="padding: 10px; font-size: 16px; margin-bottom: 20px"
        >
            Join Queue
        </button>
        <div
            id="output"
            style="font-family: monospace; background: #f4f4f4; padding: 10px"
        ></div>

        <script>
            const myPlayerId = "player_" + Math.floor(Math.random() * 10000);

            const mySkill = Math.floor(Math.random() * 6500);

            document.getElementById("identity").innerHTML =
                `You are: <b>${myPlayerId}</b> (MMR: ${mySkill})`;

            const socket = new WebSocket("ws://127.0.0.1:3000/ws");
            const output = document.getElementById("output");

            socket.onopen = function (e) {
                output.innerHTML +=
                    "<p style='color: green;'>Connected to edge gateway!</p>";
            };

            document.getElementById("joinBtn").onclick = function () {
                const payload = {
                    action: "join_queue",
                    player_id: myPlayerId,
                    skill_rating: mySkill,
                };
                socket.send(JSON.stringify(payload));
                output.innerHTML += `<p><i>Searching for a fair match...</i></p>`;
            };

            socket.onmessage = function (event) {
                if (event.data.includes("[MATCH FOUND]")) {
                    output.innerHTML += `<p style='color: #b8860b; font-size: 18px;'><b>${event.data}</b></p>`;
                } else {
                    output.innerHTML += `<p style='color: blue;'><b>Server:</b> ${event.data}</p>`;
                }
            };
        </script>
    </body>
</html>
