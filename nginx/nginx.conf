events {
    worker_connections 1024;
}

http {
    upstream rust_gateways {
        # Docker automatically resolves this to the IP addresses of ALL running gateway clones.
        server gateway:3000;
    }

    server {
        listen 3000;

        location /ws {
            proxy_pass http://rust_gateways;

            # These headers are MANDATORY for WebSockets to pass through the load balancer
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "Upgrade";
            proxy_set_header Host $host;

            # Longer timeouts for gaming connections
            proxy_read_timeout 3600s;
            proxy_send_timeout 3600s;
        }
    }
}
